version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mediassist-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mediassist
    volumes:
      - mongodb_data:/data/db
    networks:
      - mediassist-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: mediassist-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/mediassist?authSource=admin
      JWT_SECRET: your-secret-key-change-this-in-production
      GEMINI_API_KEY: your-gemini-api-key
    depends_on:
      - mongodb
    networks:
      - mediassist-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: mediassist-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      REACT_APP_GEMINI_API_KEY: your-gemini-api-key
    depends_on:
      - backend
    networks:
      - mediassist-network

volumes:
  mongodb_data:

networks:
  mediassist-network:
    driver: bridge
